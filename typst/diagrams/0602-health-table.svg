<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240">
  <rect x="0" y="0" width="720" height="240" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">The health table: one row per table per run, three consumers</text>

  <!-- Left: pipeline run input -->
  <rect x="14" y="92" width="78" height="44" fill="#458588" opacity="0.08" rx="4"/>
  <rect x="14" y="92" width="78" height="44" fill="none" stroke="#458588" stroke-width="1" rx="4"/>
  <text x="53" y="111" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">pipeline run</text>
  <text x="53" y="124" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">08:00 batch</text>

  <!-- Arrow from pipeline run into the table -->
  <line x1="92" y1="114" x2="119" y2="114" stroke="#79740e" stroke-width="1.5"/>
  <polygon points="118,111 124,114 118,117" fill="#79740e"/>

  <!-- Center: health table -->
  <text x="343" y="42" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">pipeline_health</text>

  <rect x="124" y="48" width="438" height="120" fill="#f9f5d7" stroke="#79740e" stroke-width="1.5" rx="4"/>
  <rect x="124" y="48" width="438" height="20" fill="#ebdbb2" rx="4"/>
  <rect x="124" y="62" width="438" height="6" fill="#ebdbb2"/>

  <!-- Header row column labels -->
  <text x="167" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">run_id</text>
  <text x="227" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">table_name</text>
  <text x="285" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">extracted_at</text>
  <text x="339" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">source_rows</text>
  <text x="393" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">rows_extracted</text>
  <text x="450" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">dest_rows</text>
  <text x="500" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">load_seconds</text>
  <text x="544" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="700">status</text>

  <!-- Column separators (subtle verticals) -->
  <line x1="197" y1="50" x2="197" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>
  <line x1="258" y1="50" x2="258" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>
  <line x1="313" y1="50" x2="313" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>
  <line x1="366" y1="50" x2="366" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>
  <line x1="421" y1="50" x2="421" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>
  <line x1="479" y1="50" x2="479" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>
  <line x1="522" y1="50" x2="522" y2="166" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Row 1: orders OK -->
  <text x="167" y="86" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2025-05-11-08:00</text>
  <text x="227" y="86" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">orders</text>
  <text x="285" y="86" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">08:00:15</text>
  <text x="339" y="86" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">50000</text>
  <text x="393" y="86" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">50000</text>
  <text x="450" y="86" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">50000</text>
  <text x="500" y="86" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">12.3</text>
  <rect x="528" y="78" width="32" height="12" fill="#79740e" opacity="0.18" rx="2"/>
  <text x="544" y="86" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">OK</text>

  <line x1="131" y1="94" x2="555" y2="94" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Row 2: invoices FAIL -->
  <text x="167" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2025-05-11-08:00</text>
  <text x="227" y="110" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">invoices</text>
  <text x="285" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">08:00:43</text>
  <text x="339" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">8200</text>
  <text x="393" y="110" text-anchor="middle" fill="#9d0006" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">0</text>
  <text x="450" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">--</text>
  <text x="500" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">45.0</text>
  <rect x="524" y="102" width="40" height="12" fill="#9d0006" opacity="0.18" rx="2"/>
  <text x="544" y="110" text-anchor="middle" fill="#9d0006" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">FAIL</text>

  <line x1="131" y1="118" x2="555" y2="118" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Row 3: customers OK -->
  <text x="167" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2025-05-11-08:00</text>
  <text x="227" y="134" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">customers</text>
  <text x="285" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">08:01:02</text>
  <text x="339" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">12000</text>
  <text x="393" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">12000</text>
  <text x="450" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">12000</text>
  <text x="500" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">4.1</text>
  <rect x="528" y="126" width="32" height="12" fill="#79740e" opacity="0.18" rx="2"/>
  <text x="544" y="134" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">OK</text>

  <line x1="131" y1="142" x2="555" y2="142" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Continuation hint -->
  <text x="343" y="158" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">. . . one row per table per run, append forever</text>

  <!-- Caption under the table -->
  <text x="343" y="184" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">the single source of truth for run / data / load metrics</text>

  <!-- Right: three downstream consumers -->
  <!-- Consumer 1: dashboard -->
  <rect x="588" y="50" width="120" height="34" fill="#458588" opacity="0.08" rx="4"/>
  <rect x="588" y="50" width="120" height="34" fill="none" stroke="#458588" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <text x="648" y="64" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">Morning dashboard</text>
  <text x="648" y="76" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">yesterday's status, all tables</text>

  <!-- Consumer 2: alerting -->
  <rect x="588" y="92" width="120" height="34" fill="#9d0006" opacity="0.08" rx="4"/>
  <rect x="588" y="92" width="120" height="34" fill="none" stroke="#9d0006" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <text x="648" y="106" text-anchor="middle" fill="#9d0006" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">Alerting</text>
  <text x="648" y="118" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">rules query for breach detection</text>

  <!-- Consumer 3: SLA report -->
  <rect x="588" y="134" width="120" height="34" fill="#d79921" opacity="0.10" rx="4"/>
  <rect x="588" y="134" width="120" height="34" fill="none" stroke="#d79921" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <text x="648" y="148" text-anchor="middle" fill="#b57614" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">SLA report</text>
  <text x="648" y="160" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">freshness aggregations over time</text>

  <!-- Arrows from table to each consumer -->
  <line x1="562" y1="76" x2="585" y2="67" stroke="#928374" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="583,64 590,66 585,71" fill="#928374"/>

  <line x1="562" y1="108" x2="585" y2="109" stroke="#928374" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="583,106 590,109 583,112" fill="#928374"/>

  <line x1="562" y1="140" x2="585" y2="151" stroke="#928374" stroke-width="1" stroke-dasharray="3,2"/>
  <polygon points="583,148 590,152 583,154" fill="#928374"/>

  <!-- Downstream zone label -->
  <text x="648" y="184" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">three consumers, one table</text>

  <!-- Bottom zones -->
  <rect x="14" y="200" width="548" height="22" fill="#79740e" opacity="0.04" rx="3"/>
  <rect x="14" y="200" width="548" height="22" fill="none" stroke="#79740e" stroke-width="1" rx="3"/>
  <text x="288" y="215" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">ECL writes this: append one row per (run_id, table_name) at the end of each load</text>

  <rect x="588" y="200" width="120" height="22" fill="#928374" opacity="0.05" rx="3"/>
  <rect x="588" y="200" width="120" height="22" fill="none" stroke="#928374" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <text x="648" y="215" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">downstream reads</text>

  <!-- Legend -->
  <rect x="14" y="229" width="12" height="8" fill="#79740e" opacity="0.18" rx="2"/>
  <text x="32" y="236" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">OK</text>
  <rect x="58" y="229" width="12" height="8" fill="#9d0006" opacity="0.18" rx="2"/>
  <text x="76" y="236" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">FAIL</text>
  <text x="708" y="236" text-anchor="end" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">build the table once; new consumers cost nothing</text>
</svg>
