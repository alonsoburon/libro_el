  <text x="360" y="108" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">PARTITION BY order_id</text>
  <text x="360" y="118" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">ORDER BY _extracted_at DESC</text>
