  <text x="650" y="98" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Mar 12</text>
  <line x1="437" y1="104" x2="683" y2="104" stroke="#d5c4a1" stroke-width="0.3"/>

  <text x="462" y="118" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">1003</text>
  <text x="525" y="118" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">pending</text>
  <text x="585" y="118" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">780</text>
  <text x="650" y="118" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Mar 12</text>

  <!-- View annotation -->
  <text x="555" y="145" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">3 rows: one per key, latest version</text>
  <text x="555" y="158" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Consumers query this. Log is invisible.</text>

  <!-- ═══ Legend ═══ -->
  <rect x="20" y="232" width="10" height="8" fill="#d5c4a1" opacity="0.4" rx="2"/>
