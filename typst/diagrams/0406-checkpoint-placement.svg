<svg xmlns="http://www.w3.org/2000/svg" width="720" height="230" viewBox="0 0 720 230">
  <rect width="720" height="230" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Checkpoint placement: when to declare success</text>

  <!-- ═══ Pipeline stages (horizontal timeline) ═══ -->
  <rect x="30" y="44" width="120" height="32" fill="#f9f5d7" rx="16" stroke="#d5c4a1" stroke-width="1"/>
  <text x="90" y="64" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">Extract batch</text>

  <line x1="150" y1="60" x2="208" y2="60" stroke="#d5c4a1" stroke-width="1.5"/>
  <polygon points="208,57 215,60 208,63" fill="#d5c4a1"/>

  <rect x="218" y="44" width="120" height="32" fill="#f9f5d7" rx="16" stroke="#d5c4a1" stroke-width="1"/>
  <text x="278" y="64" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">Load to dest</text>

  <line x1="338" y1="60" x2="393" y2="60" stroke="#d5c4a1" stroke-width="1.5"/>
  <polygon points="393,57 400,60 393,63" fill="#d5c4a1"/>

  <rect x="403" y="44" width="120" height="32" fill="#f9f5d7" rx="16" stroke="#d5c4a1" stroke-width="1"/>
  <text x="463" y="64" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">Confirm load</text>

  <line x1="523" y1="60" x2="573" y2="60" stroke="#d5c4a1" stroke-width="1.5"/>
  <polygon points="573,57 580,60 573,63" fill="#d5c4a1"/>

  <rect x="583" y="44" width="120" height="32" fill="#f9f5d7" rx="16" stroke="#d5c4a1" stroke-width="1"/>
  <text x="643" y="64" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">Advance cursor</text>

  <!-- ═══ Vulnerability window (subtle underbar) ═══ -->
  <line x1="338" y1="82" x2="703" y2="82" stroke="#d79921" stroke-width="1" opacity="0.35"/>
  <line x1="338" y1="80" x2="338" y2="84" stroke="#d79921" stroke-width="1" opacity="0.35"/>
  <line x1="703" y1="80" x2="703" y2="84" stroke="#d79921" stroke-width="1" opacity="0.35"/>
  <text x="520" y="93" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">vulnerability window</text>

  <!-- ═══ Checkpoint A: before load (red) ═══ -->
  <circle cx="182" cy="60" r="4" fill="#cc241d"/>
  <line x1="182" y1="76" x2="182" y2="108" stroke="#cc241d" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="174" y="106" text-anchor="end" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">A</text>

  <rect x="16" y="114" width="218" height="56" fill="#cc241d" opacity="0.05" rx="4"/>
  <rect x="16" y="114" width="3.5" height="56" fill="#cc241d" rx="2"/>
  <text x="30" y="129" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Before load: gap risk</text>
  <text x="30" y="143" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">Cursor advances, then load starts.</text>
  <text x="30" y="156" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">If load fails, data is skipped permanently.</text>
  <text x="30" y="167" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">Next run starts past the gap.</text>

  <!-- ═══ Checkpoint B: after load, before confirm (gold) ═══ -->
  <circle cx="366" cy="60" r="4" fill="#d79921"/>
  <line x1="366" y1="76" x2="366" y2="108" stroke="#d79921" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="358" y="106" text-anchor="end" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">B</text>

  <rect x="251" y="114" width="218" height="56" fill="#d79921" opacity="0.05" rx="4"/>
  <rect x="251" y="114" width="3.5" height="56" fill="#d79921" rx="2"/>
  <text x="265" y="129" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">After load, before confirm: reprocessing</text>
  <text x="265" y="143" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">Load done, but cursor update fails.</text>
  <text x="265" y="156" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">Next run re-loads the same batch.</text>
  <text x="265" y="167" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">Safe if load is idempotent.</text>

  <!-- ═══ Checkpoint C: after confirmed load (green) ═══ -->
  <circle cx="548" cy="60" r="4" fill="#689d6a"/>
  <line x1="548" y1="76" x2="548" y2="108" stroke="#689d6a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="540" y="106" text-anchor="end" fill="#689d6a" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">C</text>

  <rect x="486" y="114" width="218" height="56" fill="#689d6a" opacity="0.05" rx="4"/>
  <rect x="486" y="114" width="3.5" height="56" fill="#689d6a" rx="2"/>
  <text x="500" y="129" fill="#689d6a" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">After confirmed load: correct</text>
  <text x="500" y="143" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">Cursor advances only after destination</text>
  <text x="500" y="156" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">confirms success. Retry reprocesses</text>
  <text x="500" y="167" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">same batch -- always safe.</text>

  <!-- ═══ Legend ═══ -->
  <line x1="16" y1="192" x2="704" y2="192" stroke="#ebdbb2" stroke-width="0.5"/>

  <circle cx="30" cy="210" r="3.5" fill="#cc241d"/>
  <text x="40" y="213" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">gap risk (data loss)</text>

  <circle cx="200" cy="210" r="3.5" fill="#d79921"/>
  <text x="210" y="213" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">reprocessing (safe if idempotent)</text>

  <circle cx="430" cy="210" r="3.5" fill="#689d6a"/>
  <text x="440" y="213" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">correct default</text>

  <line x1="580" y1="210" x2="610" y2="210" stroke="#d79921" stroke-width="1" opacity="0.4"/>
  <text x="618" y="213" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">vulnerability window</text>
</svg>