<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240">
  <rect width="720" height="240" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Partial failure recovery: where it failed determines what's safe</text>

  <!-- ============================================================ -->
  <!-- Top row: four pipeline stages                                 -->
  <!-- ============================================================ -->
  <!-- Stage 1: Extract -->
  <rect x="30" y="38" width="140" height="34" fill="#f9f5d7" rx="6" stroke="#689d6a" stroke-width="1.4"/>
  <text x="100" y="59" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">1. Extract</text>

  <!-- arrow + checkpoint dot -->
  <line x1="170" y1="55" x2="195" y2="55" stroke="#7c6f64" stroke-width="1.2"/>
  <circle cx="197" cy="55" r="2.6" fill="#7c6f64"/>
  <line x1="200" y1="55" x2="218" y2="55" stroke="#7c6f64" stroke-width="1.2"/>
  <polygon points="217,52 224,55 217,58" fill="#7c6f64"/>

  <!-- Stage 2: Stage -->
  <rect x="225" y="38" width="140" height="34" fill="#f9f5d7" rx="6" stroke="#689d6a" stroke-width="1.4"/>
  <text x="295" y="59" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">2. Stage</text>

  <line x1="365" y1="55" x2="390" y2="55" stroke="#7c6f64" stroke-width="1.2"/>
  <circle cx="392" cy="55" r="2.6" fill="#7c6f64"/>
  <line x1="395" y1="55" x2="413" y2="55" stroke="#7c6f64" stroke-width="1.2"/>
  <polygon points="412,52 419,55 412,58" fill="#7c6f64"/>

  <!-- Stage 3: Validate -->
  <rect x="420" y="38" width="140" height="34" fill="#f9f5d7" rx="6" stroke="#689d6a" stroke-width="1.4"/>
  <text x="490" y="59" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">3. Validate</text>

  <line x1="560" y1="55" x2="585" y2="55" stroke="#7c6f64" stroke-width="1.2"/>
  <circle cx="587" cy="55" r="2.6" fill="#7c6f64"/>
  <line x1="590" y1="55" x2="608" y2="55" stroke="#7c6f64" stroke-width="1.2"/>
  <polygon points="607,52 614,55 607,58" fill="#7c6f64"/>

  <!-- Stage 4: Load (orange border, the risky one) -->
  <rect x="615" y="38" width="75" height="34" fill="#fbf1c7" rx="6" stroke="#d65d0e" stroke-width="1.4"/>
  <text x="652" y="59" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">4. Load</text>

  <!-- tiny label above checkpoints -->
  <text x="197" y="32" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-style="italic">ckpt</text>
  <text x="392" y="32" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-style="italic">ckpt</text>
  <text x="587" y="32" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-style="italic">ckpt</text>

  <!-- ============================================================ -->
  <!-- "if failure here" connectors                                  -->
  <!-- ============================================================ -->
  <line x1="100" y1="72" x2="100" y2="86" stroke="#689d6a" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="295" y1="72" x2="295" y2="86" stroke="#689d6a" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="490" y1="72" x2="490" y2="86" stroke="#689d6a" stroke-width="0.8" stroke-dasharray="2,2"/>
  <line x1="652" y1="72" x2="652" y2="86" stroke="#d65d0e" stroke-width="0.8" stroke-dasharray="2,2"/>

  <!-- ============================================================ -->
  <!-- Recovery callouts under stages 1-3 (green, safe to retry)    -->
  <!-- ============================================================ -->
  <!-- under 1 -->
  <rect x="30" y="88" width="140" height="56" fill="#79740e" opacity="0.07" rx="4"/>
  <rect x="30" y="88" width="140" height="56" fill="none" stroke="#79740e" stroke-width="1" rx="4"/>
  <text x="38" y="102" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700">✓</text>
  <text x="50" y="101" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="700">retry safe</text>
  <text x="38" y="116" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">nothing landed yet</text>
  <text x="38" y="128" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">cursor not advanced</text>
  <text x="38" y="139" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">idempotent by default</text>

  <!-- under 2 -->
  <rect x="225" y="88" width="140" height="56" fill="#79740e" opacity="0.07" rx="4"/>
  <rect x="225" y="88" width="140" height="56" fill="none" stroke="#79740e" stroke-width="1" rx="4"/>
  <text x="233" y="102" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700">✓</text>
  <text x="245" y="101" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="700">retry safe</text>
  <text x="233" y="116" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">staging is overwritten</text>
  <text x="233" y="128" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">production untouched</text>
  <text x="233" y="139" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">scratch space, no impact</text>

  <!-- under 3 -->
  <rect x="420" y="88" width="140" height="56" fill="#79740e" opacity="0.07" rx="4"/>
  <rect x="420" y="88" width="140" height="56" fill="none" stroke="#79740e" stroke-width="1" rx="4"/>
  <text x="428" y="102" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700">✓</text>
  <text x="440" y="101" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="700">retry safe</text>
  <text x="428" y="116" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">validation is read-only</text>
  <text x="428" y="128" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">no state mutated</text>
  <text x="428" y="139" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">re-run the checks</text>

  <!-- ============================================================ -->
  <!-- Stage 4 forked sub-decision                                   -->
  <!-- ============================================================ -->
  <!-- fork connectors -->
  <line x1="652" y1="86" x2="652" y2="92" stroke="#d65d0e" stroke-width="0.8"/>
  <line x1="605" y1="92" x2="700" y2="92" stroke="#d65d0e" stroke-width="0.8"/>
  <line x1="605" y1="92" x2="605" y2="100" stroke="#d65d0e" stroke-width="0.8"/>
  <line x1="700" y1="92" x2="700" y2="100" stroke="#d65d0e" stroke-width="0.8"/>

  <!-- branch A: before atomic commit (green) -->
  <rect x="572" y="100" width="62" height="44" fill="#79740e" opacity="0.07" rx="4"/>
  <rect x="572" y="100" width="62" height="44" fill="none" stroke="#79740e" stroke-width="1" rx="4"/>
  <text x="603" y="113" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">before commit</text>
  <text x="603" y="126" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">✓ retry safe</text>
  <text x="603" y="138" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">prod untouched</text>

  <!-- branch B: after partial write (red) -->
  <rect x="638" y="100" width="72" height="44" fill="#9d0006" opacity="0.08" rx="4"/>
  <rect x="638" y="100" width="72" height="44" fill="none" stroke="#9d0006" stroke-width="1.4" rx="4"/>
  <text x="674" y="113" text-anchor="middle" fill="#9d0006" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">partial write</text>
  <text x="674" y="126" text-anchor="middle" fill="#9d0006" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">✗ investigate</text>
  <text x="674" y="138" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">detect state first</text>

  <!-- ============================================================ -->
  <!-- Mid-band explanation lines                                    -->
  <!-- ============================================================ -->
  <line x1="30" y1="162" x2="690" y2="162" stroke="#ebdbb2" stroke-width="0.6"/>
  <text x="30" y="176" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Atomic load (staging swap, MERGE in a tx)</text>
  <text x="270" y="176" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-style="italic">collapses the entire pipeline to a single commit point.</text>

  <text x="30" y="192" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Non-atomic load (row-by-row, multi-statement)</text>
  <text x="290" y="192" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-style="italic">leaves production in an unknown state on mid-write failure.</text>

  <!-- ============================================================ -->
  <!-- Bottom caption                                                -->
  <!-- ============================================================ -->
  <rect x="30" y="204" width="660" height="26" fill="#689d6a" opacity="0.08" rx="4"/>
  <rect x="30" y="204" width="660" height="26" fill="none" stroke="#689d6a" stroke-width="1" rx="4"/>
  <text x="360" y="221" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Design loads to be atomic -- then every failure point becomes a free retry.</text>
</svg>
