  <text x="240" y="87" text-anchor="middle" dominant-baseline="central" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">[2.1 MB]</text>
  <text x="298" y="87" text-anchor="middle" dominant-baseline="central" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">true</text>

