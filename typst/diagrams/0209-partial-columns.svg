  <line x1="398" y1="102" x2="602" y2="102" stroke="#d5c4a1" stroke-width="0.5"/>
  <text x="415" y="117" text-anchor="middle" dominant-baseline="central" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">2</text>
  <text x="460" y="117" text-anchor="middle" dominant-baseline="central" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">Bob</text>
  <text x="515" y="117" text-anchor="middle" dominant-baseline="central" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">b@co.cl</text>
  <text x="575" y="117" text-anchor="middle" dominant-baseline="central" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">true</text>

