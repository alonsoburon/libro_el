  <text x="415" y="147" text-anchor="middle" dominant-baseline="central" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">3</text>
  <text x="460" y="147" text-anchor="middle" dominant-baseline="central" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">Carol</text>
