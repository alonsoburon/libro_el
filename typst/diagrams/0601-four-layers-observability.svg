<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220">
  <rect x="0" y="0" width="720" height="220" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Four layers of pipeline observability: each catches a different failure mode</text>

  <!-- Column headers -->
  <text x="40" y="38" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">LAYER</text>
  <text x="350" y="38" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">WHAT IT CATCHES</text>
  <text x="560" y="38" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">WHO BUILDS IT</text>

  <!-- Layer 1: Run Health (blue) -->
  <rect x="40" y="46" width="580" height="32" fill="#458588" opacity="0.06" rx="4"/>
  <rect x="40" y="46" width="580" height="32" fill="none" stroke="#458588" stroke-width="1" rx="4"/>
  <rect x="41" y="47" width="4" height="30" fill="#458588" opacity="0.4" rx="1"/>

  <text x="58" y="60" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700">Run Health</text>
  <text x="58" y="72" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">did it run, succeed, finish on time?</text>

  <text x="350" y="60" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">job failed, hung, or never started</text>
  <text x="350" y="72" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">retry storms, slow drift in duration</text>

  <text x="560" y="68" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">free from orchestrator</text>

  <!-- Layer 2: Data Health (green) -->
  <rect x="40" y="82" width="580" height="38" fill="#79740e" opacity="0.10" rx="4"/>
  <rect x="40" y="82" width="580" height="38" fill="none" stroke="#79740e" stroke-width="1.5" rx="4"/>
  <rect x="41" y="83" width="5" height="36" fill="#79740e" opacity="0.55" rx="1"/>

  <text x="60" y="97" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="10.5" font-weight="700">Data Health</text>
  <text x="60" y="109" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">row counts, freshness, fingerprints</text>

  <text x="350" y="97" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">silent data loss, drift, schema breaks</text>
  <text x="350" y="109" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">the failures the orchestrator can't see</text>

  <text x="560" y="97" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="700">earn-its-keep tier</text>
  <text x="560" y="109" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">you build this yourself</text>

  <!-- Layer 3: Source Health (yellow) -->
  <rect x="40" y="124" width="580" height="32" fill="#d79921" opacity="0.06" rx="4"/>
  <rect x="40" y="124" width="580" height="32" fill="none" stroke="#d79921" stroke-width="1" rx="4"/>
  <rect x="41" y="125" width="4" height="30" fill="#d79921" opacity="0.4" rx="1"/>

  <text x="58" y="138" fill="#b57614" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700">Source Health</text>
  <text x="58" y="150" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">query duration, timeouts, read load</text>

  <text x="350" y="138" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">source slowing down or overloaded</text>
  <text x="350" y="150" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">complaints from DBAs before they happen</text>

  <text x="560" y="146" text-anchor="middle" fill="#b57614" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">add as you scale</text>

  <!-- Layer 4: Load Health (orange) -->
  <rect x="40" y="160" width="580" height="32" fill="#d65d0e" opacity="0.06" rx="4"/>
  <rect x="40" y="160" width="580" height="32" fill="none" stroke="#d65d0e" stroke-width="1" rx="4"/>
  <rect x="41" y="161" width="4" height="30" fill="#d65d0e" opacity="0.4" rx="1"/>

  <text x="58" y="174" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700">Load Health</text>
  <text x="58" y="186" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">load cost, duration, dest row count</text>

  <text x="350" y="174" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">runaway warehouse spend, slow writes</text>
  <text x="350" y="186" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">bills and SLAs, not correctness</text>

  <text x="560" y="182" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">add as you scale</text>

  <!-- Right-side bracket: build first vs add later -->
  <line x1="632" y1="48" x2="636" y2="48" stroke="#3c3836" stroke-width="0.8"/>
  <line x1="636" y1="48" x2="636" y2="118" stroke="#3c3836" stroke-width="0.8"/>
  <line x1="632" y1="118" x2="636" y2="118" stroke="#3c3836" stroke-width="0.8"/>
  <text x="644" y="80" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">build</text>
  <text x="644" y="90" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">these</text>
  <text x="644" y="100" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="700">first</text>

  <line x1="632" y1="126" x2="636" y2="126" stroke="#928374" stroke-width="0.8"/>
  <line x1="636" y1="126" x2="636" y2="190" stroke="#928374" stroke-width="0.8"/>
  <line x1="632" y1="190" x2="636" y2="190" stroke="#928374" stroke-width="0.8"/>
  <text x="644" y="153" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">add as</text>
  <text x="644" y="163" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">you</text>
  <text x="644" y="173" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">scale</text>

  <!-- Legend -->
  <rect x="40" y="204" width="3" height="8" fill="#458588" opacity="0.5" rx="1"/>
  <text x="49" y="211" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">run</text>

  <rect x="85" y="204" width="3" height="8" fill="#79740e" opacity="0.6" rx="1"/>
  <text x="94" y="211" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">data (essential)</text>

  <rect x="185" y="204" width="3" height="8" fill="#d79921" opacity="0.5" rx="1"/>
  <text x="194" y="211" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">source</text>

  <rect x="245" y="204" width="3" height="8" fill="#d65d0e" opacity="0.5" rx="1"/>
  <text x="254" y="211" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">load</text>

  <text x="622" y="211" text-anchor="end" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">Run + Data cover the critical cases on day one.</text>
</svg>
