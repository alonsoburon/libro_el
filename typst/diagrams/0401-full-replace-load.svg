<svg xmlns="http://www.w3.org/2000/svg" width="720" height="230" viewBox="0 0 720 230">
  <rect x="0" y="0" width="720" height="230" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Full replace load: staging swap vs partition swap</text>

  <!-- ═══ LEFT: Staging Swap (3 tables) ═══ -->
  <text x="175" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Staging Swap (full table)</text>

  <!-- Source -->
  <rect x="15" y="50" width="90" height="70" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="15" y="50" width="90" height="16" fill="#ebdbb2" rx="4"/>
  <rect x="15" y="62" width="90" height="4" fill="#ebdbb2"/>
  <text x="60" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">source</text>
  <rect x="22" y="70" width="76" height="44" fill="#458588" opacity="0.06" rx="2"/>
  <text x="60" y="88" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">all rows</text>
  <text x="60" y="102" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">(current state)</text>

  <!-- Arrow: source -> stg -->
  <line x1="110" y1="85" x2="125" y2="85" stroke="#928374" stroke-width="1"/>
  <polygon points="125,82 132,85 125,88" fill="#928374"/>
  <text x="121" y="78" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="6.5">extract</text>

  <!-- Staging -->
  <rect x="135" y="50" width="90" height="70" fill="#f9f5d7" stroke="#458588" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <rect x="135" y="50" width="90" height="16" fill="#458588" opacity="0.06" rx="4"/>
  <rect x="135" y="62" width="90" height="4" fill="#458588" opacity="0.06"/>
  <text x="180" y="61" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">_stg_orders</text>
  <rect x="142" y="70" width="76" height="44" fill="#79740e" opacity="0.06" rx="2"/>
  <text x="180" y="88" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">new data</text>
  <text x="180" y="102" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">validate here</text>

  <!-- Arrow: stg -> dest (swap) -->
  <line x1="230" y1="85" x2="245" y2="85" stroke="#d65d0e" stroke-width="1.5"/>
  <polygon points="245,82 252,85 245,88" fill="#d65d0e"/>
  <text x="241" y="78" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="6.5" font-weight="600">swap</text>

  <!-- Destination -->
  <rect x="255" y="50" width="90" height="70" fill="#f9f5d7" stroke="#79740e" stroke-width="1.5" rx="4"/>
  <rect x="255" y="50" width="90" height="16" fill="#ebdbb2" rx="4"/>
  <rect x="255" y="62" width="90" height="4" fill="#ebdbb2"/>
  <text x="300" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">orders</text>
  <rect x="262" y="70" width="76" height="44" fill="#79740e" opacity="0.06" rx="2"/>
  <text x="300" y="88" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">all rows (new)</text>
  <text x="300" y="102" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">complete, verified</text>

  <!-- Note under staging swap -->
  <text x="175" y="136" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">Consumers see old data until swap, new data after. No empty window.</text>

  <!-- ═══ Divider ═══ -->
  <line x1="360" y1="32" x2="360" y2="200" stroke="#d5c4a1" stroke-width="0.5" stroke-dasharray="6,4"/>

  <!-- ═══ RIGHT: Partition Swap ═══ -->
  <text x="540" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Partition Swap (bounded range)</text>

  <!-- Before -->
  <rect x="385" y="50" width="130" height="108" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="385" y="50" width="130" height="16" fill="#ebdbb2" rx="4"/>
  <rect x="385" y="62" width="130" height="4" fill="#ebdbb2"/>
  <text x="450" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">events</text>

  <rect x="392" y="70" width="116" height="18" fill="#458588" opacity="0.06" rx="2"/>
  <text x="450" y="83" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Mar 1-3</text>

  <rect x="392" y="92" width="116" height="18" fill="#d65d0e" opacity="0.08" rx="2"/>
  <rect x="392" y="92" width="3" height="18" fill="#d65d0e" opacity="0.3" rx="1"/>
  <text x="450" y="105" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">Mar 4-6 (replace)</text>

  <rect x="392" y="114" width="116" height="18" fill="#458588" opacity="0.06" rx="2"/>
  <text x="450" y="127" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Mar 7-9</text>

  <rect x="392" y="136" width="116" height="18" fill="#458588" opacity="0.06" rx="2"/>
  <text x="450" y="149" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Mar 10+</text>

  <!-- Arrow -->
  <line x1="520" y1="101" x2="545" y2="101" stroke="#d65d0e" stroke-width="1.5"/>
  <polygon points="545,98 552,101 545,104" fill="#d65d0e"/>

  <!-- After -->
  <rect x="558" y="50" width="130" height="108" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="558" y="50" width="130" height="16" fill="#ebdbb2" rx="4"/>
  <rect x="558" y="62" width="130" height="4" fill="#ebdbb2"/>
  <text x="623" y="61" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">events</text>

  <rect x="565" y="70" width="116" height="18" fill="#458588" opacity="0.06" rx="2"/>
  <text x="623" y="83" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Mar 1-3</text>

  <rect x="565" y="92" width="116" height="18" fill="#79740e" opacity="0.08" rx="2"/>
  <rect x="565" y="92" width="3" height="18" fill="#79740e" opacity="0.3" rx="1"/>
  <text x="623" y="105" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">Mar 4-6 (new)</text>

  <rect x="565" y="114" width="116" height="18" fill="#458588" opacity="0.06" rx="2"/>
  <text x="623" y="127" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Mar 7-9</text>

  <rect x="565" y="136" width="116" height="18" fill="#458588" opacity="0.06" rx="2"/>
  <text x="623" y="149" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">Mar 10+</text>

  <!-- Note under partition swap -->
  <text x="540" y="174" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">Only the target range is rewritten. Rest is untouched.</text>

  <!-- ═══ Legend ═══ -->
  <rect x="30" y="200" width="10" height="8" fill="#79740e" opacity="0.12" rx="2"/>
  <text x="45" y="207" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">new data</text>

  <rect x="140" y="199" width="10" height="10" fill="#458588" opacity="0.08" rx="2" stroke="#458588" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="155" y="207" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">staging (dropped after swap)</text>

  <rect x="350" y="200" width="10" height="8" fill="#d65d0e" opacity="0.12" rx="2"/>
  <text x="365" y="207" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">partition being replaced</text>

  <rect x="540" y="200" width="10" height="8" fill="#458588" opacity="0.08" rx="2"/>
  <text x="555" y="207" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">untouched (immutable key)</text>
</svg>
