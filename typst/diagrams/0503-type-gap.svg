<svg xmlns="http://www.w3.org/2000/svg" width="720" height="310" viewBox="0 0 720 310">
  <rect width="720" height="310" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">The type gap: transactional types collapse into columnar types</text>

  <!-- ═══ Source engine (left) ═══ -->
  <text x="110" y="40" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">PostgreSQL / SQL Server</text>
  <text x="110" y="52" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">dozens of specific types</text>

  <!-- Integers -->
  <rect x="16" y="62" width="188" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="110" y="74" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">SMALLINT, INTEGER, BIGINT</text>

  <!-- Fixed-point (dangerous) -->
  <rect x="16" y="88" width="188" height="18" fill="#cc241d" opacity="0.08" stroke="#cc241d" stroke-width="0.8" rx="3"/>
  <text x="110" y="100" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">NUMERIC(18,6), MONEY</text>

  <!-- Floats -->
  <rect x="16" y="114" width="188" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="110" y="126" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">REAL, DOUBLE PRECISION</text>

  <!-- Strings -->
  <rect x="16" y="148" width="188" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="110" y="160" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">CHAR, VARCHAR, TEXT, NVARCHAR</text>

  <!-- Temporal -->
  <rect x="16" y="174" width="188" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="110" y="186" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">DATE, DATETIME2(7), TIME</text>

  <rect x="16" y="196" width="188" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="110" y="208" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">TIMESTAMP WITH TIME ZONE</text>

  <!-- Booleans (tricky) -->
  <rect x="16" y="222" width="188" height="18" fill="#d79921" opacity="0.08" stroke="#d79921" stroke-width="0.8" rx="3"/>
  <text x="110" y="234" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">BIT, TINYINT(1), 'Y'/'N'</text>

  <!-- Other -->
  <rect x="16" y="248" width="188" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="110" y="260" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">JSONB, UUID, BYTEA, XML</text>

  <!-- ═══ Destination engine (right) ═══ -->
  <text x="600" y="40" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">BigQuery / Snowflake</text>
  <text x="600" y="52" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">handful of broad types</text>

  <!-- INT64 -->
  <rect x="516" y="62" width="168" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="600" y="74" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">INT64</text>

  <!-- NUMERIC (correct explicit target) -->
  <rect x="516" y="88" width="168" height="18" fill="#689d6a" opacity="0.08" stroke="#689d6a" stroke-width="0.8" rx="3"/>
  <text x="600" y="100" text-anchor="middle" fill="#689d6a" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">NUMERIC(38,9) / NUMBER</text>

  <!-- FLOAT64 (dangerous loader default) -->
  <rect x="516" y="114" width="168" height="18" fill="#cc241d" opacity="0.08" stroke="#cc241d" stroke-width="0.8" rx="3"/>
  <text x="600" y="126" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">FLOAT64</text>

  <!-- STRING -->
  <rect x="516" y="148" width="168" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="600" y="160" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">STRING</text>

  <!-- TIMESTAMP -->
  <rect x="516" y="174" width="168" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="600" y="186" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">TIMESTAMP</text>

  <!-- BOOL -->
  <rect x="516" y="222" width="168" height="18" fill="#d79921" opacity="0.08" stroke="#d79921" stroke-width="0.8" rx="3"/>
  <text x="600" y="234" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">BOOL</text>

  <!-- STRING / JSON -->
  <rect x="516" y="248" width="168" height="18" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="0.8" rx="3"/>
  <text x="600" y="260" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">STRING / JSON</text>

  <!-- ═══ Arrows ═══ -->
  <!-- Integers → INT64 -->
  <line x1="204" y1="71" x2="516" y2="71" stroke="#d5c4a1" stroke-width="0.8"/>
  <polygon points="513,69 516,71 513,73" fill="#d5c4a1"/>

  <!-- NUMERIC/MONEY → NUMERIC (correct, green) -->
  <line x1="204" y1="94" x2="516" y2="97" stroke="#689d6a" stroke-width="1.5"/>
  <polygon points="513,95 516,97 513,99" fill="#689d6a"/>

  <!-- NUMERIC/MONEY → FLOAT64 (dangerous, red dashed) -->
  <line x1="204" y1="102" x2="516" y2="123" stroke="#cc241d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="513,121 516,123 513,125" fill="#cc241d"/>

  <!-- REAL/DOUBLE → FLOAT64 (safe) -->
  <line x1="204" y1="123" x2="516" y2="123" stroke="#d5c4a1" stroke-width="0.8"/>
  <polygon points="513,121 516,123 513,125" fill="#d5c4a1"/>

  <!-- Strings → STRING -->
  <line x1="204" y1="157" x2="516" y2="157" stroke="#d5c4a1" stroke-width="0.8"/>
  <polygon points="513,155 516,157 513,159" fill="#d5c4a1"/>

  <!-- DATE/DATETIME2 → TIMESTAMP -->
  <line x1="204" y1="183" x2="516" y2="183" stroke="#d5c4a1" stroke-width="0.8"/>
  <polygon points="513,181 516,183 513,185" fill="#d5c4a1"/>

  <!-- TIMESTAMPTZ → TIMESTAMP -->
  <line x1="204" y1="205" x2="516" y2="186" stroke="#d5c4a1" stroke-width="0.8"/>
  <polygon points="513,184 516,186 513,188" fill="#d5c4a1"/>

  <!-- Booleans → BOOL (tricky) -->
  <line x1="204" y1="231" x2="516" y2="231" stroke="#d79921" stroke-width="1.2"/>
  <polygon points="513,229 516,231 513,233" fill="#d79921"/>

  <!-- JSONB/UUID → STRING/JSON -->
  <line x1="204" y1="257" x2="516" y2="257" stroke="#d5c4a1" stroke-width="0.8"/>
  <polygon points="513,255 516,257 513,259" fill="#d5c4a1"/>

  <!-- ═══ Annotations (white bg labels on arrows) ═══ -->
  <rect x="328" y="82" width="64" height="12" fill="#ffffff" rx="2"/>
  <text x="360" y="91" text-anchor="middle" fill="#689d6a" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">explicit DDL</text>

  <rect x="296" y="104" width="128" height="12" fill="#ffffff" rx="2"/>
  <text x="360" y="113" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">loader default -- precision loss</text>

  <rect x="300" y="222" width="120" height="12" fill="#ffffff" rx="2"/>
  <text x="360" y="231" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">TINYINT(1) may hold 2, -1</text>

  <!-- ═══ Legend ═══ -->
  <line x1="16" y1="278" x2="704" y2="278" stroke="#ebdbb2" stroke-width="0.5"/>

  <line x1="16" y1="294" x2="40" y2="294" stroke="#689d6a" stroke-width="1.5"/>
  <polygon points="37,292 40,294 37,296" fill="#689d6a"/>
  <text x="46" y="297" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">correct explicit cast</text>

  <line x1="210" y1="294" x2="234" y2="294" stroke="#cc241d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="231,292 234,294 231,296" fill="#cc241d"/>
  <text x="240" y="297" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">dangerous loader default (define DDL to avoid)</text>

  <line x1="530" y1="294" x2="554" y2="294" stroke="#d79921" stroke-width="1.2"/>
  <polygon points="551,292 554,294 551,296" fill="#d79921"/>
  <text x="560" y="297" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5">check value distribution</text>
</svg>