<?xml version="1.0" encoding="utf-8"?>
<svg width="720" height="480" viewBox="0 0 720 480" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="720" height="480" fill="#181825" rx="6"></rect><text x="360" y="24" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">One detail table, many downstream views</text><rect x="230" y="50" width="260" height="120" fill="#1e1e2e" stroke="#6c8ebf" stroke-width="2" rx="6"></rect><rect x="230" y="50" width="260" height="28" fill="#6c8ebf" rx="6"></rect><rect x="230" y="64" width="260" height="14" fill="#6c8ebf"></rect><text x="360" y="69" text-anchor="middle" fill="#1e1e2e" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="bold">order_lines</text><text x="360" y="96" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">order_id · line_id · product_id</text><text x="360" y="114" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">customer_id · warehouse_id · region</text><text x="360" y="132" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">quantity · unit_price · currency</text><text x="360" y="150" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">order_date · ship_date · status</text><line x1="360" y1="170" x2="112.5" y2="300" stroke="#5aab7b" stroke-width="1.5" stroke-opacity="0.6"></line><polygon points="112.5,300 108.5,292 116.5,292" fill="#5aab7b" fill-opacity="0.8"></polygon><rect x="42.5" y="300" width="140" height="80" fill="#1e1e2e" stroke="#5aab7b" stroke-width="1.5" rx="5"></rect><text x="112.5" y="318" text-anchor="middle" fill="#5aab7b" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">v_revenue</text><text x="112.5" y="332" text-anchor="middle" fill="#5aab7b" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">_by_product</text><text x="112.5" y="350" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">GROUP BY product, month</text><text x="112.5" y="363" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">SUM(qty × price)</text><text x="112.5" y="400" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Sales</text><line x1="360" y1="170" x2="277.5" y2="300" stroke="#d4a040" stroke-width="1.5" stroke-opacity="0.6"></line><polygon points="277.5,300 273.5,292 281.5,292" fill="#d4a040" fill-opacity="0.8"></polygon><rect x="207.5" y="300" width="140" height="80" fill="#1e1e2e" stroke="#d4a040" stroke-width="1.5" rx="5"></rect><text x="277.5" y="318" text-anchor="middle" fill="#d4a040" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">v_cost</text><text x="277.5" y="332" text-anchor="middle" fill="#d4a040" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">_by_center</text><text x="277.5" y="350" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">GROUP BY cost_ctr, qtr</text><text x="277.5" y="363" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">SUM(qty × price)</text><text x="277.5" y="400" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Finance</text><line x1="360" y1="170" x2="442.5" y2="300" stroke="#58b0a0" stroke-width="1.5" stroke-opacity="0.6"></line><polygon points="442.5,300 438.5,292 446.5,292" fill="#58b0a0" fill-opacity="0.8"></polygon><rect x="372.5" y="300" width="140" height="80" fill="#1e1e2e" stroke="#58b0a0" stroke-width="1.5" rx="5"></rect><text x="442.5" y="318" text-anchor="middle" fill="#58b0a0" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">v_shipments</text><text x="442.5" y="332" text-anchor="middle" fill="#58b0a0" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">_by_location</text><text x="442.5" y="350" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">GROUP BY warehouse, week</text><text x="442.5" y="363" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">SUM(quantity)</text><text x="442.5" y="400" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Warehouse</text><line x1="360" y1="170" x2="607.5" y2="300" stroke="#d46a6a" stroke-width="1.5" stroke-opacity="0.6"></line><polygon points="607.5,300 603.5,292 611.5,292" fill="#d46a6a" fill-opacity="0.8"></polygon><rect x="537.5" y="300" width="140" height="80" fill="#1e1e2e" stroke="#d46a6a" stroke-width="1.5" rx="5"></rect><text x="607.5" y="318" text-anchor="middle" fill="#d46a6a" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">v_returns</text><text x="607.5" y="332" text-anchor="middle" fill="#d46a6a" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">_by_reason</text><text x="607.5" y="350" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">GROUP BY return_type</text><text x="607.5" y="363" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">COUNT(*), SUM(qty)</text><text x="607.5" y="400" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-style="italic">Support</text><line x1="30" y1="230" x2="690" y2="230" stroke="#585b70" stroke-width="1" stroke-dasharray="6,4"></line><text x="685" y="224" text-anchor="end" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">pipeline boundary — views live downstream</text><text x="685" y="110" text-anchor="end" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">← pipeline lands this</text><text x="360" y="460" text-anchor="middle" fill="#6c7086" font-family="'Segoe UI', system-ui, sans-serif" font-size="10">Views change when business logic changes. The pipeline doesn't.</text></svg>