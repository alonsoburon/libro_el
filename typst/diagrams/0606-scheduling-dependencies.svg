<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240">
  <rect x="0" y="0" width="720" height="240" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Scheduling and dependencies: source cadence drives downstream freshness</text>

  <!-- Column headers -->
  <text x="90" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Source pipelines</text>
  <text x="360" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Landed tables (warehouse)</text>
  <text x="610" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Downstream consumers</text>

  <!-- ===================== TIER 1: source pipelines ===================== -->
  <!-- orders pipeline: 30min, green -->
  <rect x="20" y="52" width="140" height="34" fill="#f9f5d7" stroke="#79740e" stroke-width="1" rx="4"/>
  <circle cx="32" cy="64" r="4" fill="none" stroke="#79740e" stroke-width="1"/>
  <line x1="32" y1="64" x2="32" y2="61" stroke="#79740e" stroke-width="1"/>
  <line x1="32" y1="64" x2="34.5" y2="64" stroke="#79740e" stroke-width="1"/>
  <text x="42" y="67" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">orders pipeline</text>
  <text x="42" y="79" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">every 30 min</text>

  <!-- customers pipeline: hourly, yellow -->
  <rect x="20" y="100" width="140" height="34" fill="#f9f5d7" stroke="#d79921" stroke-width="1" rx="4"/>
  <circle cx="32" cy="112" r="4" fill="none" stroke="#d79921" stroke-width="1"/>
  <line x1="32" y1="112" x2="32" y2="109" stroke="#d79921" stroke-width="1"/>
  <line x1="32" y1="112" x2="34.5" y2="112" stroke="#d79921" stroke-width="1"/>
  <text x="42" y="115" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">customers pipeline</text>
  <text x="42" y="127" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">hourly</text>

  <!-- products pipeline: daily 03:00, orange -->
  <rect x="20" y="148" width="140" height="34" fill="#f9f5d7" stroke="#d65d0e" stroke-width="1" rx="4"/>
  <circle cx="32" cy="160" r="4" fill="none" stroke="#d65d0e" stroke-width="1"/>
  <line x1="32" y1="160" x2="32" y2="157" stroke="#d65d0e" stroke-width="1"/>
  <line x1="32" y1="160" x2="34.5" y2="160" stroke="#d65d0e" stroke-width="1"/>
  <text x="42" y="163" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">products pipeline</text>
  <text x="42" y="175" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">daily at 03:00</text>

  <!-- ===================== TIER 2: landed tables ===================== -->
  <!-- orders table -->
  <rect x="290" y="52" width="140" height="34" fill="#f9f5d7" stroke="#79740e" stroke-width="1.2" rx="4"/>
  <rect x="290" y="52" width="140" height="12" fill="#ebdbb2" rx="4"/>
  <rect x="290" y="60" width="140" height="4" fill="#ebdbb2"/>
  <text x="360" y="61" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">orders</text>
  <text x="360" y="79" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">freshness: 12 min stale</text>

  <!-- customers table -->
  <rect x="290" y="100" width="140" height="34" fill="#f9f5d7" stroke="#d79921" stroke-width="1.2" rx="4"/>
  <rect x="290" y="100" width="140" height="12" fill="#ebdbb2" rx="4"/>
  <rect x="290" y="108" width="140" height="4" fill="#ebdbb2"/>
  <text x="360" y="109" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">customers</text>
  <text x="360" y="127" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">freshness: 25 min stale</text>

  <!-- products table -->
  <rect x="290" y="148" width="140" height="34" fill="#f9f5d7" stroke="#d65d0e" stroke-width="1.2" rx="4"/>
  <rect x="290" y="148" width="140" height="12" fill="#ebdbb2" rx="4"/>
  <rect x="290" y="156" width="140" height="4" fill="#ebdbb2"/>
  <text x="360" y="157" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">products</text>
  <text x="360" y="175" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">freshness: 6 h stale</text>

  <!-- ===================== TIER 3: downstream consumers ===================== -->
  <!-- sales_dashboard -->
  <rect x="540" y="48" width="160" height="42" fill="#f9f5d7" stroke="#458588" stroke-width="1" rx="4"/>
  <text x="620" y="62" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">sales_dashboard</text>
  <text x="620" y="74" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">refresh hourly</text>
  <text x="620" y="84" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">SLA: orders + customers &lt; 1 h</text>

  <!-- product_catalog -->
  <rect x="540" y="98" width="160" height="42" fill="#f9f5d7" stroke="#458588" stroke-width="1" rx="4"/>
  <text x="620" y="112" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">product_catalog</text>
  <text x="620" y="124" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">refresh daily</text>
  <text x="620" y="134" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">SLA: products &lt; 24 h</text>

  <!-- executive_kpi (critical path) -->
  <rect x="540" y="148" width="160" height="42" fill="#fbf1c7" stroke="#cc241d" stroke-width="1.5" rx="4"/>
  <text x="620" y="162" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">executive_kpi</text>
  <text x="620" y="174" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">refresh hourly (intended)</text>
  <text x="620" y="184" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">effective freshness: 6 h</text>

  <!-- ===================== Tier 1 -> Tier 2 arrows ===================== -->
  <line x1="160" y1="69" x2="285" y2="69" stroke="#79740e" stroke-width="1.2"/>
  <polygon points="285,66 292,69 285,72" fill="#79740e"/>
  <text x="222" y="64" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">lands</text>

  <line x1="160" y1="117" x2="285" y2="117" stroke="#d79921" stroke-width="1.2"/>
  <polygon points="285,114 292,117 285,120" fill="#d79921"/>
  <text x="222" y="112" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">lands</text>

  <line x1="160" y1="165" x2="285" y2="165" stroke="#d65d0e" stroke-width="1.2"/>
  <polygon points="285,162 292,165 285,168" fill="#d65d0e"/>
  <text x="222" y="160" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">lands</text>

  <!-- ===================== Tier 2 -> Tier 3 arrows ===================== -->
  <!-- orders -> sales_dashboard -->
  <line x1="430" y1="69" x2="535" y2="69" stroke="#928374" stroke-width="1"/>
  <polygon points="535,66 542,69 535,72" fill="#928374"/>

  <!-- customers -> sales_dashboard -->
  <path d="M 430 110 C 480 110, 490 75, 535 75" fill="none" stroke="#928374" stroke-width="1"/>
  <polygon points="533,72 540,75 533,78" fill="#928374"/>

  <!-- products -> product_catalog -->
  <line x1="430" y1="165" x2="535" y2="119" stroke="#928374" stroke-width="1"/>
  <polygon points="533.5,116.4 540.5,118.3 535,123" fill="#928374"/>

  <!-- Critical path: products -> executive_kpi (red, thick) -->
  <line x1="430" y1="170" x2="535" y2="170" stroke="#cc241d" stroke-width="1.8"/>
  <polygon points="535,166.5 542.5,170 535,173.5" fill="#cc241d"/>

  <!-- orders -> executive_kpi (faint) -->
  <path d="M 430 80 C 480 80, 490 160, 535 160" fill="none" stroke="#928374" stroke-width="0.8" stroke-dasharray="3,2"/>
  <polygon points="533,157 540,160 533,163" fill="#928374"/>

  <!-- customers -> executive_kpi (faint) -->
  <path d="M 430 124 C 480 124, 490 164, 535 164" fill="none" stroke="#928374" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Critical path label -->
  <text x="482" y="186" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">slowest upstream</text>

  <!-- ===================== Bottom caption + legend ===================== -->
  <rect x="20" y="202" width="680" height="22" fill="#cc241d" opacity="0.05" rx="3"/>
  <rect x="20" y="202" width="680" height="22" fill="none" stroke="#cc241d" stroke-width="0.8" rx="3"/>
  <text x="360" y="216" text-anchor="middle" fill="#cc241d" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">the downstream SLA is bounded by the slowest upstream</text>

  <!-- Legend dots for cadence colors -->
  <circle cx="32" cy="234" r="3" fill="#79740e"/>
  <text x="40" y="237" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">frequent (30 min)</text>
  <circle cx="160" cy="234" r="3" fill="#d79921"/>
  <text x="168" y="237" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">hourly</text>
  <circle cx="232" cy="234" r="3" fill="#d65d0e"/>
  <text x="240" y="237" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">daily</text>
  <line x1="320" y1="234" x2="340" y2="234" stroke="#cc241d" stroke-width="1.8"/>
  <text x="346" y="237" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">critical path</text>
  <line x1="430" y1="234" x2="450" y2="234" stroke="#928374" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="456" y="237" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">other dependency</text>
</svg>
