<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220">
  <rect x="0" y="0" width="720" height="220" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Backfill types: three shapes of reloading historical data</text>

  <!-- Time axis -->
  <line x1="160" y1="40" x2="690" y2="40" stroke="#d5c4a1" stroke-width="1"/>
  <polygon points="690,37 698,40 690,43" fill="#d5c4a1"/>

  <!-- Time markers -->
  <text x="160" y="33" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">1y ago</text>
  <line x1="160" y1="37" x2="160" y2="43" stroke="#d5c4a1" stroke-width="0.5"/>
  <text x="320" y="33" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">6mo ago</text>
  <line x1="320" y1="37" x2="320" y2="43" stroke="#d5c4a1" stroke-width="0.5"/>
  <text x="500" y="33" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">3mo ago</text>
  <line x1="500" y1="37" x2="500" y2="43" stroke="#d5c4a1" stroke-width="0.5"/>
  <text x="660" y="33" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">now</text>
  <line x1="660" y1="37" x2="660" y2="43" stroke="#d5c4a1" stroke-width="0.5"/>

  <!-- Daily routine band (green, thin) -->
  <rect x="640" y="50" width="20" height="10" fill="#79740e" opacity="0.25" rx="2"/>
  <rect x="640" y="50" width="20" height="10" fill="none" stroke="#79740e" stroke-width="0.6" rx="2"/>
  <text x="158" y="58" text-anchor="end" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">daily routine</text>
  <text x="635" y="58" text-anchor="end" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">today's window</text>

  <!-- Row 1: Full reload (blue, spans entire range) -->
  <text x="158" y="79" text-anchor="end" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">Full reload</text>
  <text x="158" y="89" text-anchor="end" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">everything from time zero</text>
  <rect x="160" y="70" width="500" height="22" fill="#458588" opacity="0.1" rx="3"/>
  <rect x="160" y="70" width="500" height="22" fill="none" stroke="#458588" stroke-width="1" rx="3"/>
  <rect x="161" y="71" width="3" height="20" fill="#458588" opacity="0.4" rx="1"/>
  <text x="410" y="84" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">reload entire history</text>
  <text x="410" y="103" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">use when state is corrupted or load strategy changed</text>

  <!-- Row 2: Targeted partitions (yellow, several narrow bands) -->
  <text x="158" y="123" text-anchor="end" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">Targeted partitions</text>
  <text x="158" y="133" text-anchor="end" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">specific date ranges</text>
  <!-- Background guide line for row -->
  <line x1="160" y1="125" x2="660" y2="125" stroke="#ebdbb2" stroke-width="0.5" stroke-dasharray="2,3"/>
  <!-- 2024-Q1 band -->
  <rect x="200" y="114" width="40" height="22" fill="#d79921" opacity="0.18" rx="3"/>
  <rect x="200" y="114" width="40" height="22" fill="none" stroke="#d79921" stroke-width="1" rx="3"/>
  <text x="220" y="128" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">2024-Q1</text>
  <!-- 2024-Q3 band -->
  <rect x="360" y="114" width="40" height="22" fill="#d79921" opacity="0.18" rx="3"/>
  <rect x="360" y="114" width="40" height="22" fill="none" stroke="#d79921" stroke-width="1" rx="3"/>
  <text x="380" y="128" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">2024-Q3</text>
  <!-- 2025-Feb band (narrower) -->
  <rect x="540" y="114" width="20" height="22" fill="#d79921" opacity="0.18" rx="3"/>
  <rect x="540" y="114" width="20" height="22" fill="none" stroke="#d79921" stroke-width="1" rx="3"/>
  <text x="550" y="128" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">2025-Feb</text>
  <text x="410" y="147" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">use when known windows were bad</text>

  <!-- Row 3: State reset + replay (orange, from mid-point to now) -->
  <text x="158" y="167" text-anchor="end" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">State reset + replay</text>
  <text x="158" y="177" text-anchor="end" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">reset cursor, replay forward</text>
  <!-- Reset marker -->
  <line x1="420" y1="154" x2="420" y2="180" stroke="#d65d0e" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="420" y="151" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">state-reset point</text>
  <rect x="420" y="158" width="240" height="22" fill="#d65d0e" opacity="0.12" rx="3"/>
  <rect x="420" y="158" width="240" height="22" fill="none" stroke="#d65d0e" stroke-width="1" rx="3"/>
  <rect x="421" y="159" width="3" height="20" fill="#d65d0e" opacity="0.45" rx="1"/>
  <text x="540" y="172" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">replay from reset to now</text>
  <!-- Arrow showing direction -->
  <line x1="430" y1="184" x2="650" y2="184" stroke="#d65d0e" stroke-width="0.7"/>
  <polygon points="648,182 654,184 648,186" fill="#d65d0e"/>
  <text x="540" y="195" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">use when state diverged from source</text>

  <!-- Bottom caption -->
  <text x="360" y="213" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-style="italic">every backfill is also a load: idempotent, gated, and observable like a regular run</text>
</svg>
