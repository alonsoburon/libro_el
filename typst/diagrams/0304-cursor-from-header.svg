<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260">
  <rect x="0" y="0" width="720" height="260" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Borrowing the header's cursor — order_lines has no updated_at of its own</text>

  <text x="155" y="36" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">Source</text>
  <text x="565" y="36" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="600">Destination</text>

  <!-- ═══ orders table: header 18px + colheader 16px + 2 rows x 18px + 6px pad = 76px ═══ -->
