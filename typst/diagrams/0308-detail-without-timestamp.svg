  <line x1="27" y1="98" x2="283" y2="98" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- row 2: 1002 (CHANGED) -->
  <rect x="22" y="100" width="266" height="18" fill="#d65d0e" opacity="0.14" rx="2"/>
  <text x="55" y="112" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">1002</text>
  <text x="135" y="112" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">pending</text>
  <text x="230" y="112" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="700">Mar 3 14:08</text>
