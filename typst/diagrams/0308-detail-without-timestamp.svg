  <text x="460" y="92" text-anchor="middle" fill="#bdae93" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">1001</text>
  <text x="525" y="92" text-anchor="middle" fill="#bdae93" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">1</text>
