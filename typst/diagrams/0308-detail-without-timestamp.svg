<svg xmlns="http://www.w3.org/2000/svg" width="720" height="220" viewBox="0 0 720 220">
  <rect x="0" y="0" width="720" height="220" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Detail without timestamp -- parent cursor cascades via FK</text>

  <text x="155" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Parent: orders (has updated_at)</text>
  <text x="555" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Detail: order_lines (no updated_at)</text>

  <!-- ============ Parent table: orders ============ -->
  <rect x="20" y="46" width="270" height="92" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="20" y="46" width="270" height="18" fill="#ebdbb2" rx="4"/>
  <rect x="20" y="60" width="270" height="4" fill="#ebdbb2"/>
