  <polygon points="415,107 423,111 415,115" fill="#d65d0e"/>
  <text x="358" y="105" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">FK cascade</text>
  <text x="358" y="124" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7">order_id = 1002</text>

  <!-- ============ Detail table: order_lines ============ -->
  <rect x="425" y="46" width="280" height="132" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="425" y="46" width="280" height="18" fill="#ebdbb2" rx="4"/>
