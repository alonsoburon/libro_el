  <!-- row 2: 1002/1 (HIGHLIGHT) -->
  <rect x="427" y="100" width="276" height="18" fill="#d65d0e" opacity="0.14" rx="2"/>
  <text x="460" y="112" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">1002</text>
  <text x="525" y="112" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">1</text>
  <text x="600" y="112" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">8</text>
  <text x="665" y="112" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">45.00</text>
  <line x1="432" y1="118" x2="698" y2="118" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- row 3: 1002/2 (HIGHLIGHT) -->
  <rect x="427" y="120" width="276" height="18" fill="#d65d0e" opacity="0.14" rx="2"/>
  <text x="460" y="132" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">1002</text>
  <text x="525" y="132" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">2</text>
  <text x="600" y="132" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">3</text>
  <text x="665" y="132" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">120.00</text>
  <line x1="432" y1="138" x2="698" y2="138" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- row 4: 1002/3 (HIGHLIGHT) -->
  <rect x="427" y="140" width="276" height="18" fill="#d65d0e" opacity="0.14" rx="2"/>
  <text x="460" y="152" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">1002</text>
  <text x="525" y="152" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">3</text>
  <text x="600" y="152" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">1</text>
  <text x="665" y="152" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">9.99</text>
  <line x1="432" y1="158" x2="698" y2="158" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- row 5: 1003/1 (dim) -->
  <text x="460" y="172" text-anchor="middle" fill="#bdae93" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">1003</text>
  <text x="525" y="172" text-anchor="middle" fill="#bdae93" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">1</text>
  <text x="600" y="172" text-anchor="middle" fill="#bdae93" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">20</text>
  <text x="665" y="172" text-anchor="middle" fill="#bdae93" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">7.25</text>

  <!-- ============ SQL filter label ============ -->
  <rect x="20" y="150" width="385" height="28" fill="#d65d0e" opacity="0.06" stroke="#d65d0e" stroke-width="0.8" rx="3"/>
  <text x="212" y="162" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">extraction filter</text>
  <text x="212" y="173" text-anchor="middle" fill="#3c3836" font-family="'Consolas', 'Courier New', monospace" font-size="8.5">WHERE order_id IN (SELECT order_id FROM orders WHERE updated_at &gt; :cursor)</text>

  <!-- ============ Bottom note ============ -->
  <text x="360" y="198" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-style="italic">Works if the parent's updated_at fires on any line change. If not, see hash-based detection (3.8) or activity-driven (2.7).</text>
  <text x="360" y="212" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">The parent's cursor IS the detail's cursor -- the FK carries the change boundary.</text>
</svg>
