  <text x="135" y="132" text-anchor="middle" fill="#3c3836" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">confirmed</text>
  <text x="230" y="132" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Feb 28 17:40</text>

  <!-- cursor line -->
  <line x1="22" y1="103" x2="288" y2="103" stroke="#d65d0e" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="296" y="106" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-weight="600">&gt; cursor</text>

