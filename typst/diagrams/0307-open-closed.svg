<svg xmlns="http://www.w3.org/2000/svg" width="800" height="192" viewBox="0 0 800 192"><rect x="0" y="0" width="800" height="192" fill="#181825" rx="6"></rect><text x="400" y="20" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Open / closed document split</text><rect x="40" y="96" width="165.23076923076923" height="56" fill="#d4a040" rx="3"></rect><text x="122.61538461538461" y="116.5" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">OPEN DOCUMENTS</text><text x="122.61538461538461" y="131.5" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">(mutable, re-extract all)</text><rect x="207.23076923076923" y="96" width="110.15384615384616" height="56" fill="#b8a44e" rx="3"></rect><text x="262.3076923076923" y="116.5" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">RECENTLY CLOSED</text><text x="262.3076923076923" y="131.5" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">(cursor catches transition)</text><rect x="319.38461538461536" y="96" width="440.61538461538464" height="56" fill="#585b70" rx="3"></rect><text x="539.6923076923076" y="116.5" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">CLOSED DOCUMENTS</text><text x="539.6923076923076" y="131.5" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">(immutable, cursor only)</text><line x1="40" y1="88" x2="205.23076923076923" y2="88" stroke="#585b70" stroke-width="1"></line><line x1="40" y1="85" x2="40" y2="91" stroke="#585b70" stroke-width="1"></line><line x1="205.23076923076923" y1="85" x2="205.23076923076923" y2="91" stroke="#585b70" stroke-width="1"></line><text x="122.61538461538461" y="80" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">SELECT * WHERE status = 'open'</text><line x1="207.23076923076923" y1="60" x2="760" y2="60" stroke="#585b70" stroke-width="1"></line><line x1="207.23076923076923" y1="57" x2="207.23076923076923" y2="63" stroke="#585b70" stroke-width="1"></line><line x1="760" y1="57" x2="760" y2="63" stroke="#585b70" stroke-width="1"></line><text x="483.61538461538464" y="52" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">SELECT * WHERE status = 'closed' AND updated_at &gt;= :cursor</text><line x1="40" y1="160" x2="760" y2="160" stroke="#585b70" stroke-width="1"></line><line x1="40" y1="157" x2="40" y2="163" stroke="#585b70" stroke-width="1"></line><line x1="760" y1="157" x2="760" y2="163" stroke="#585b70" stroke-width="1"></line><text x="400" y="174" text-anchor="middle" fill="#a6adc8" font-family="'Segoe UI', system-ui, sans-serif" font-size="11">UNION → single load</text></svg>
