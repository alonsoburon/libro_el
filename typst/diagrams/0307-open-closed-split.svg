<svg xmlns="http://www.w3.org/2000/svg" width="720" height="310" viewBox="0 0 720 310">
  <rect x="0" y="0" width="720" height="310" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Open/closed split — mutable documents re-extracted fully, frozen ones by cursor only</text>

  <!-- ═══ Source invoices table (x=20..250, y=44..262) ═══ -->
  <text x="135" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Source: invoices</text>

  <rect x="20" y="44" width="230" height="218" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="20" y="44" width="230" height="18" fill="#ebdbb2" rx="4"/>
  <rect x="20" y="58" width="230" height="4" fill="#ebdbb2"/>

  <!-- col headers -->
  <text x="55" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">invoice_id</text>
  <text x="125" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">status</text>
  <text x="200" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">updated_at</text>
  <line x1="27" y1="63" x2="243" y2="63" stroke="#d5c4a1" stroke-width="0.5"/>

  <!-- ═══ Open zone (orange tint, y=64..134) ═══ -->
  <rect x="21" y="64" width="228" height="70" fill="#d65d0e" opacity="0.05"/>
  <rect x="21" y="64" width="3" height="70" fill="#d65d0e" opacity="0.3" rx="1"/>

  <!-- Open row 1: y=80 -->
  <text x="55" y="80" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-401</text>
  <text x="125" y="80" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">open</text>
  <text x="200" y="80" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Mar 28</text>
  <line x1="27" y1="86" x2="243" y2="86" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Open row 2: y=100 -->
  <text x="55" y="100" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-405</text>
  <text x="125" y="100" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">open</text>
  <text x="200" y="100" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Apr 2</text>
  <line x1="27" y1="106" x2="243" y2="106" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Open row 3: y=120 -->
  <text x="55" y="120" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-412</text>
  <text x="125" y="120" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">open</text>
  <text x="200" y="120" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Apr 5</text>
  <line x1="27" y1="126" x2="243" y2="126" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Open zone label (inside table, bottom-right of zone) -->
  <text x="240" y="132" text-anchor="end" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">re-extract all  ↑</text>

  <!-- ═══ Divider ═══ -->
  <line x1="27" y1="134" x2="243" y2="134" stroke="#d5c4a1" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══ Closed zone (green tint, y=135..262) ═══ -->
  <rect x="21" y="135" width="228" height="127" fill="#79740e" opacity="0.04"/>
  <rect x="21" y="135" width="3" height="127" fill="#79740e" opacity="0.2" rx="1"/>

  <!-- Closed row 1: recently closed (highlighted) y=150 -->
  <rect x="24" y="138" width="225" height="20" fill="#79740e" opacity="0.06"/>
  <text x="55" y="152" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-398</text>
  <text x="125" y="152" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">closed</text>
  <text x="200" y="152" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Apr 4</text>
  <line x1="27" y1="158" x2="243" y2="158" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Closed row 2: old, dimmed y=172 -->
  <text x="55" y="172" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-102</text>
  <text x="125" y="172" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">closed</text>
  <text x="200" y="172" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Jan 15</text>
  <line x1="27" y1="178" x2="243" y2="178" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Closed row 3: old, dimmed y=192 -->
  <text x="55" y="192" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-187</text>
  <text x="125" y="192" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">closed</text>
  <text x="200" y="192" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Feb 10</text>
  <line x1="27" y1="198" x2="243" y2="198" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Closed row 4: old, dimmed y=212 -->
  <text x="55" y="212" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-203</text>
  <text x="125" y="212" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">closed</text>
  <text x="200" y="212" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Feb 28</text>
  <line x1="27" y1="218" x2="243" y2="218" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Closed ellipsis -->
  <text x="135" y="242" text-anchor="middle" fill="#d5c4a1" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">… 12,000 more …</text>

  <!-- Closed zone label (inside table, top-right of zone) -->
  <text x="240" y="146" text-anchor="end" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">↓  cursor only</text>

  <!-- ═══ UNION ALL box (centered between zones, x=320..390, y=140..156) ═══ -->
  <!-- Center Y = midpoint of open zone center (99) and closed zone center (190) ≈ 148 -->
  <rect x="320" y="140" width="70" height="16" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="3"/>
  <text x="355" y="151" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">UNION ALL</text>

  <!-- ═══ Curved elbow arrows ═══ -->

  <!-- Open elbow: horizontal at y=99, curve down into UNION ALL top -->
  <path d="M 250,99 L 338,99 Q 355,99 355,116 L 355,140" stroke="#d65d0e" stroke-width="1.5" fill="none"/>
  <polygon points="352,138 355,144 358,138" fill="#d65d0e"/>
  <!-- Label on horizontal segment -->
  <rect x="262" y="86" width="64" height="12" fill="#ffffff" rx="2"/>
  <text x="294" y="95" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">status = 'open'</text>

  <!-- Closed elbow: horizontal at y=197, curve up into UNION ALL bottom -->
  <path d="M 250,197 L 338,197 Q 355,197 355,180 L 355,156" stroke="#79740e" stroke-width="1.5" fill="none"/>
  <polygon points="352,158 355,152 358,158" fill="#79740e"/>
  <!-- Label on horizontal segment -->
  <rect x="258" y="200" width="72" height="12" fill="#ffffff" rx="2"/>
  <text x="294" y="209" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">updated_at >= :last</text>

  <!-- Output arrow: UNION ALL → batch -->
  <line x1="390" y1="148" x2="418" y2="148" stroke="#928374" stroke-width="1.5"/>
  <polygon points="415,144 425,148 415,152" fill="#928374"/>

  <!-- ═══ Extracted batch (x=428..700, y=44..186) ═══ -->
  <text x="564" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Extracted batch</text>

  <rect x="428" y="44" width="272" height="140" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="428" y="44" width="272" height="18" fill="#ebdbb2" rx="4"/>
  <rect x="428" y="58" width="272" height="4" fill="#ebdbb2"/>

  <!-- col headers -->
  <text x="462" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">invoice_id</text>
  <text x="535" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">status</text>
  <text x="608" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">updated_at</text>
  <text x="672" y="56" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">branch</text>
  <line x1="435" y1="63" x2="693" y2="63" stroke="#d5c4a1" stroke-width="0.5"/>

  <!-- Open rows in batch (orange left bar) -->
  <rect x="429" y="64" width="3" height="66" fill="#d65d0e" opacity="0.3" rx="1"/>

  <text x="462" y="80" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-401</text>
  <text x="535" y="80" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">open</text>
  <text x="608" y="80" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Mar 28</text>
  <text x="672" y="80" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">open</text>
  <line x1="435" y1="86" x2="693" y2="86" stroke="#d5c4a1" stroke-width="0.3"/>

  <text x="462" y="100" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-405</text>
  <text x="535" y="100" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">open</text>
  <text x="608" y="100" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Apr 2</text>
  <text x="672" y="100" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">open</text>
  <line x1="435" y1="106" x2="693" y2="106" stroke="#d5c4a1" stroke-width="0.3"/>

  <text x="462" y="120" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-412</text>
  <text x="535" y="120" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">open</text>
  <text x="608" y="120" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">Apr 5</text>
  <text x="672" y="120" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">open</text>
  <line x1="435" y1="126" x2="693" y2="126" stroke="#d5c4a1" stroke-width="0.3"/>

  <!-- Closed row in batch (green left bar) -->
  <rect x="429" y="130" width="3" height="22" fill="#79740e" opacity="0.3" rx="1"/>

  <text x="462" y="146" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">INV-398</text>
  <text x="535" y="146" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">closed</text>
  <text x="608" y="146" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Apr 4</text>
  <text x="672" y="146" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">cursor</text>

  <!-- Batch annotation -->
  <text x="564" y="174" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-style="italic">4 rows out of 12,007 — open set + recent closes</text>

  <!-- ═══ Hard delete note ═══ -->
  <rect x="428" y="196" width="272" height="44" fill="#9d0006" opacity="0.04" rx="4"/>
  <rect x="428" y="196" width="272" height="44" fill="none" stroke="#9d0006" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <text x="438" y="212" fill="#9d0006" font-family="'Segoe UI', system-ui, sans-serif" font-size="8.5" font-weight="600">Hard delete detection (at destination):</text>
  <text x="438" y="226" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">open keys NOT IN batch → deleted at source</text>

  <!-- ═══ Legend ═══ -->
  <rect x="20" y="280" width="3" height="12" fill="#d65d0e" opacity="0.3" rx="1"/>
  <text x="29" y="290" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">open (mutable) — full set every run</text>

  <rect x="240" y="280" width="3" height="12" fill="#79740e" opacity="0.3" rx="1"/>
  <text x="249" y="290" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">closed (frozen) — cursor only</text>

  <rect x="440" y="280" width="14" height="10" fill="#d5c4a1" opacity="0.4" rx="2"/>
  <text x="460" y="289" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">skipped (behind cursor, unchanged)</text>
