<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240">
  <rect x="0" y="0" width="720" height="240" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Hard rules vs soft rules: what the system enforces, what humans claim</text>

  <!-- ============================================ -->
  <!-- TOP ZONE: HARD RULES (small visible band)    -->
  <!-- ============================================ -->
  <rect x="20" y="32" width="680" height="54" fill="#458588" opacity="0.06" rx="4"/>
  <rect x="20" y="32" width="680" height="54" fill="none" stroke="#458588" stroke-width="1" rx="4"/>
  <rect x="21" y="33" width="3" height="52" fill="#458588" opacity="0.4" rx="1"/>

  <text x="34" y="46" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Hard rules: enforced by the database</text>
  <text x="34" y="57" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">if violated, the database refuses the operation</text>

  <!-- Hard rule chips in a row -->
  <rect x="34" y="64" width="92" height="16" fill="#458588" opacity="0.12" stroke="#458588" stroke-width="0.8" rx="3"/>
  <text x="80" y="75" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">PRIMARY KEY</text>

  <rect x="134" y="64" width="80" height="16" fill="#458588" opacity="0.12" stroke="#458588" stroke-width="0.8" rx="3"/>
  <text x="174" y="75" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">NOT NULL</text>

  <rect x="222" y="64" width="92" height="16" fill="#458588" opacity="0.12" stroke="#458588" stroke-width="0.8" rx="3"/>
  <text x="268" y="75" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">FOREIGN KEY</text>

  <rect x="322" y="64" width="96" height="16" fill="#458588" opacity="0.12" stroke="#458588" stroke-width="0.8" rx="3"/>
  <text x="370" y="75" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">UNIQUE INDEX</text>

  <rect x="426" y="64" width="92" height="16" fill="#458588" opacity="0.12" stroke="#458588" stroke-width="0.8" rx="3"/>
  <text x="472" y="75" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">CHECK</text>

  <text x="612" y="75" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">the small visible part</text>

  <!-- ============================================ -->
  <!-- DIVIDING LINE                                 -->
  <!-- ============================================ -->
  <line x1="20" y1="94" x2="700" y2="94" stroke="#928374" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="360" y="91" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">what the database enforces &#8593;    /    what humans say &#8595;</text>

  <!-- ============================================ -->
  <!-- BOTTOM ZONE: SOFT RULES (large hidden part)  -->
  <!-- ============================================ -->
  <rect x="20" y="102" width="680" height="100" fill="#d65d0e" opacity="0.06" rx="4"/>
  <rect x="20" y="102" width="680" height="100" fill="none" stroke="#d65d0e" stroke-width="1" rx="4"/>
  <rect x="21" y="103" width="3" height="98" fill="#d65d0e" opacity="0.4" rx="1"/>

  <text x="34" y="115" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">Soft rules: spoken by humans, the database does not know</text>
  <text x="34" y="126" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">no enforcement -- expectations that can (and will) be wrong</text>

  <!-- Left column of soft rules -->
  <text x="34" y="143" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">&#8220;An order always has at least one line&#8221;</text>
  <text x="34" y="153" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">until someone saves an empty one</text>

  <text x="34" y="168" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">&#8220;Orders go pending &#8594; confirmed &#8594; shipped&#8221;</text>
  <text x="34" y="178" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">until support manually reopens one</text>

  <text x="34" y="193" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">&#8220;Quantities are always positive&#8221;</text>
  <text x="34" y="203" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">until a return shows -1</text>

  <!-- Right column of soft rules -->
  <text x="370" y="143" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">&#8220;Only open invoices get deleted&#8221;</text>
  <text x="370" y="153" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">until a back-office script deletes a closed one</text>

  <text x="370" y="168" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">&#8220;Emails are unique&#8221;</text>
  <text x="370" y="178" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">until two customers share one (no unique index)</text>

  <text x="370" y="193" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">&#8220;Line status always matches the header&#8221;</text>
  <text x="370" y="203" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic">until one disputed line breaks ranks</text>

  <!-- "more lurks below" tag -->
  <text x="668" y="198" text-anchor="end" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-style="italic" opacity="0.8">...and many more</text>

  <!-- ============================================ -->
  <!-- BOTTOM CAPTION + LEGEND                       -->
  <!-- ============================================ -->
  <text x="360" y="218" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-weight="600">your pipeline must survive soft rules being wrong</text>

  <!-- Legend -->
  <rect x="180" y="228" width="12" height="8" fill="#458588" opacity="0.12" stroke="#458588" stroke-width="0.8" rx="2"/>
  <text x="198" y="235" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">hard: enforced by the database</text>

  <rect x="400" y="228" width="12" height="8" fill="#d65d0e" opacity="0.12" stroke="#d65d0e" stroke-width="0.8" rx="2"/>
  <text x="418" y="235" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8">soft: claimed by humans, unenforced</text>
</svg>
