<svg xmlns="http://www.w3.org/2000/svg" width="720" height="240" viewBox="0 0 720 240">
  <rect x="0" y="0" width="720" height="240" fill="#ffffff" rx="6"/>
  <text x="360" y="18" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" letter-spacing="0.3">Partition swap: atomic per-partition replace, other partitions untouched</text>

  <!-- ═══ LEFT: Before (destination) ═══ -->
  <text x="100" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Destination: orders (before)</text>

  <rect x="20" y="46" width="160" height="124" fill="#f9f5d7" stroke="#d5c4a1" stroke-width="1" rx="4"/>
  <rect x="20" y="46" width="160" height="16" fill="#ebdbb2" rx="4"/>
  <rect x="20" y="58" width="160" height="4" fill="#ebdbb2"/>
  <text x="100" y="57" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">orders (partitioned by month)</text>

  <rect x="27" y="68" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="100" y="78" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-01</text>

  <rect x="27" y="84" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="100" y="94" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-02</text>

  <rect x="27" y="100" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="100" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-03</text>

  <rect x="27" y="116" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="100" y="126" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-04</text>

  <rect x="27" y="132" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="100" y="142" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-05</text>

  <rect x="27" y="148" width="146" height="14" fill="#d65d0e" opacity="0.12" rx="2"/>
  <rect x="27" y="148" width="3" height="14" fill="#d65d0e" opacity="0.4" rx="1"/>
  <text x="100" y="158" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">2024-06 (stale)</text>

  <!-- ═══ MIDDLE: Staging block + swap arrow ═══ -->
  <text x="360" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Staging partition</text>

  <rect x="295" y="92" width="130" height="46" fill="#f9f5d7" stroke="#458588" stroke-width="1" stroke-dasharray="4,3" rx="4"/>
  <rect x="295" y="92" width="130" height="14" fill="#458588" opacity="0.06" rx="4"/>
  <rect x="295" y="102" width="130" height="4" fill="#458588" opacity="0.06"/>
  <text x="360" y="102" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">_stg_orders_2024_06</text>
  <rect x="302" y="110" width="116" height="22" fill="#79740e" opacity="0.1" rx="2"/>
  <text x="360" y="124" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">new June data</text>

  <!-- Curved arrow from staging down into 2024-06 slot of "before" -->
  <path d="M 295 130 Q 240 165 185 155" fill="none" stroke="#d65d0e" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="187,151 180,155 187,159" fill="#d65d0e"/>

  <!-- Curved arrow from staging into the new 2024-06 slot of "after" -->
  <path d="M 425 130 Q 480 165 535 155" fill="none" stroke="#79740e" stroke-width="1.5"/>
  <polygon points="533,151 540,155 533,159" fill="#79740e"/>

  <!-- Swap label -->
  <rect x="270" y="60" width="180" height="22" fill="#d65d0e" opacity="0.08" stroke="#d65d0e" stroke-width="0.8" rx="3"/>
  <text x="360" y="74" text-anchor="middle" fill="#d65d0e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">ALTER TABLE ... EXCHANGE PARTITION</text>

  <text x="360" y="150" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7" font-style="italic">atomic pointer swap</text>

  <!-- ═══ RIGHT: After (destination) ═══ -->
  <text x="620" y="38" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="600">Destination: orders (after)</text>

  <rect x="540" y="46" width="160" height="124" fill="#f9f5d7" stroke="#79740e" stroke-width="1.5" rx="4"/>
  <rect x="540" y="46" width="160" height="16" fill="#ebdbb2" rx="4"/>
  <rect x="540" y="58" width="160" height="4" fill="#ebdbb2"/>
  <text x="620" y="57" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">orders (partitioned by month)</text>

  <rect x="547" y="68" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="620" y="78" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-01</text>

  <rect x="547" y="84" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="620" y="94" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-02</text>

  <rect x="547" y="100" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="620" y="110" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-03</text>

  <rect x="547" y="116" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="620" y="126" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-04</text>

  <rect x="547" y="132" width="146" height="14" fill="#458588" opacity="0.06" rx="2"/>
  <text x="620" y="142" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">2024-05</text>

  <rect x="547" y="148" width="146" height="14" fill="#79740e" opacity="0.14" rx="2"/>
  <rect x="547" y="148" width="3" height="14" fill="#79740e" opacity="0.5" rx="1"/>
  <text x="620" y="158" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5" font-weight="600">2024-06 (new)</text>

  <!-- ═══ Atomicity caption ═══ -->
  <text x="360" y="186" text-anchor="middle" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-style="italic">atomic: consumers see old XOR new, never half. Partitions 2024-01..05 are untouched.</text>

  <!-- ═══ Per-engine syntax row ═══ -->
  <rect x="20" y="198" width="216" height="32" fill="#458588" opacity="0.05" stroke="#458588" stroke-width="0.6" rx="3"/>
  <text x="128" y="211" text-anchor="middle" fill="#458588" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">PostgreSQL</text>
  <text x="128" y="223" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">ALTER TABLE ... ATTACH PARTITION</text>

  <rect x="244" y="198" width="216" height="32" fill="#d79921" opacity="0.07" stroke="#d79921" stroke-width="0.6" rx="3"/>
  <text x="352" y="211" text-anchor="middle" fill="#d79921" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">ClickHouse</text>
  <text x="352" y="223" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">ALTER TABLE ... REPLACE PARTITION</text>

  <rect x="468" y="198" width="232" height="32" fill="#79740e" opacity="0.06" stroke="#79740e" stroke-width="0.6" rx="3"/>
  <text x="584" y="211" text-anchor="middle" fill="#79740e" font-family="'Segoe UI', system-ui, sans-serif" font-size="8" font-weight="600">BigQuery</text>
  <text x="584" y="223" text-anchor="middle" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="7.5">copy job, WRITE_TRUNCATE + $20240601 decorator</text>
</svg>
