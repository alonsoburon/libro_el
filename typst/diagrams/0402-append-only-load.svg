  <text x="39" y="194" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">new rows (pure INSERT, no matching)</text>

  <rect x="260" y="186" width="10" height="8" fill="#d5c4a1" opacity="0.3" rx="2"/>
  <text x="276" y="193" fill="#7c6f64" font-family="'Segoe UI', system-ui, sans-serif" font-size="9">already loaded (untouched)</text>

  <text x="520" y="194" fill="#928374" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" font-style="italic">Cost scales with batch size, not table size.</text>
