<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>0108</title>
<style>body{margin:0;background:#181825;display:flex;flex-direction:column;align-items:center;padding:40px 20px}button{background:#333;color:#ccc;border:1px solid #555;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px}button:hover{background:#444}</style>
</head><body>
<div id="chart"></div>
<button onclick="ECL.saveSVG(document.getElementById('chart'),'0108-purity-freshness')">Save SVG</button>
<script src="../ecl-charts.js"></script>
<script>
ECL.tradeoff(document.getElementById("chart"), {
  title: "Purity vs freshness",
  width: 640,
  height: 420,
  xLabel: "Freshness →",
  yLabel: "← Purity",
  xTicks: ["Daily", "Hourly", "Sub-hourly"],
  yTicks: ["Low", "Medium", "High"],
  regions: [
    { x: 0.7, y: 0.7, w: 0.3, h: 0.3, label: "Ideal zone", color: "forest" },
  ],
  points: [
    { x: 0.12, y: 0.95, label: "Full replace", color: "steel_blue" },
    { x: 0.85, y: 0.45, label: "Incremental", color: "coral" },
    { x: 0.55, y: 0.78, label: "Hybrid", color: "amber" },
    { x: 0.75, y: 0.70, label: "Append + materialize", color: "forest" },
    { x: 0.30, y: 0.88, label: "Scoped replace", color: "purple" },
  ],
});
</script></body></html>
