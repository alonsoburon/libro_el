<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>0303</title>
<style>body{margin:0;background:#181825;display:flex;flex-direction:column;align-items:center;padding:40px 20px}button{background:#333;color:#ccc;border:1px solid #555;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px}button:hover{background:#444}</style>
</head><body>
<div id="chart"></div>
<button onclick="ECL.saveSVG(document.getElementById('chart'),'0303-stateless-window')">Save SVG</button>
<script src="../ecl-charts.js"></script>
<script>
ECL.timeline(document.getElementById("chart"), {
  title: "Stateless window — fixed trailing window, no cursor",
  axis: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5", "Day 6", "Day 7", "Day 8"],
  spans: [
    { start: 0, end: 3, label: "Run on Day 3 (3-day window)", color: "steel_blue", row: 0 },
    { start: 1, end: 4, label: "Run on Day 4 (3-day window)", color: "steel_blue", row: 1 },
    { start: 2, end: 5, label: "Run on Day 5 (3-day window)", color: "steel_blue", row: 2 },
  ],
});
</script></body></html>
