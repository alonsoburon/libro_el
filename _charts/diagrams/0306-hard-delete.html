<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>0306</title>
<style>body{margin:0;background:#181825;display:flex;flex-direction:column;align-items:center;padding:40px 20px}button{background:#333;color:#ccc;border:1px solid #555;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px}button:hover{background:#444}</style>
</head><body>
<div id="chart"></div>
<button onclick="ECL.saveSVG(document.getElementById('chart'),'0306-hard-delete')">Save SVG</button>
<script src="../ecl-charts.js"></script>
<script>
ECL.tableState(document.getElementById("chart"), {
  title: "Hard delete detection — row disappears from source",
  tables: [
    {
      label: "Source (yesterday)",
      columns: ["id", "name", "status"],
      rows: [
        { data: [101, "Alice", "active"] },
        { data: [102, "Bob", "active"] },
        { data: [103, "Carol", "closed"], color: "coral", annotation: "← will be deleted" },
      ],
    },
    {
      label: "Source (today)",
      columns: ["id", "name", "status"],
      rows: [
        { data: [101, "Alice", "active"] },
        { data: [102, "Bob", "active"] },
        { data: [null, null, null], color: "coral", annotation: "← gone, no trace" },
      ],
    },
  ],
});
</script></body></html>
