<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>0310</title>
<style>body{margin:0;background:#181825;display:flex;flex-direction:column;align-items:center;padding:40px 20px}button{background:#333;color:#ccc;border:1px solid #555;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px}button:hover{background:#444}</style>
</head><body>
<div id="chart"></div>
<button onclick="ECL.saveSVG(document.getElementById('chart'),'0310-create-vs-update')">Save SVG</button>
<script src="../ecl-charts.js"></script>
<script>
ECL.timeline(document.getElementById("chart"), {
  title: "Dual cursors — created_at track + updated_at track",
  axis: ["Day 1", "Day 2", "Day 3", "Day 4", "Day 5", "Day 6"],
  spans: [
    { start: 0, end: 3, label: "created_at cursor: new inserts", color: "steel_blue", row: 0 },
    { start: 3, end: 5, label: "created_at: Day 3–5", color: "steel_blue", row: 0 },
    { start: 0, end: 2, label: "updated_at cursor: modified rows", color: "olive", row: 1 },
    { start: 2, end: 5, label: "updated_at: Day 2–5", color: "olive", row: 1 },
  ],
  cursors: [
    { pos: 3, label: "created HWM", color: "steel_blue" },
    { pos: 2, label: "updated HWM", color: "olive" },
  ],
});
</script></body></html>
