<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>0404 — orders_log anatomy</title>
  <style>
    body { margin: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    #chart { margin-bottom: 20px; }
    button { background: #333; color: #ccc; border: 1px solid #555; padding: 8px 20px; cursor: pointer; font-size: 13px; border-radius: 4px; }
    button:hover { background: #444; }
  </style>
</head>
<body>
  <div id="chart"></div>
  <button onclick="ECL.saveSVG(document.getElementById('chart'), '0404-log-anatomy')">Save SVG</button>
  <script src="../ecl-charts.js"></script>
  <script>
    ECL.segment(document.getElementById("chart"), {
      title: "orders_log anatomy",
      segments: [
        { label: "IMMUTABLE\nHISTORY",    width: 4,   color: "muted_gray" },
        { label: "MUTABLE\nBUT STABLE",   width: 1.2, color: "steel_blue" },
        { label: "UPDATED\nRECORDS",      width: 1.2, color: "olive" },
        { label: "NEW\nRECORDS",          width: 1,   color: "forest" },
      ],
      bracesTop: [
        [0, 0, "Loaded with full replace"],
        [1, 3, "Reloaded with window"],
      ],
      bracesBottom: [
        [1, 3, "Deduplicated on every READ"],
        [0, 3, "Altered for consumer on every WRITE"],
      ],
    });
  </script>
</body>
</html>
