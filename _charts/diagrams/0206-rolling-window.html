<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>0206</title>
<style>body{margin:0;background:#181825;display:flex;flex-direction:column;align-items:center;padding:40px 20px}button{background:#333;color:#ccc;border:1px solid #555;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px}button:hover{background:#444}</style>
</head><body>
<div id="chart"></div>
<button onclick="ECL.saveSVG(document.getElementById('chart'),'0206-rolling-window')">Save SVG</button>
<script src="../ecl-charts.js"></script>
<script>
ECL.segment(document.getElementById("chart"), {
  title: "Rolling window replace",
  segments: [
    { label: "FROZEN\n(outside window)", width: 5, color: "muted_gray" },
    { label: "WINDOW\n(last N days)", width: 2, color: "olive" },
  ],
  bracesTop: [
    [0, 0, "Never re-extracted — stale if source changed"],
    [1, 1, "Dropped and reloaded every run"],
  ],
  bracesBottom: [
    [0, 1, "Window advances daily → frozen zone grows"],
  ],
});
</script></body></html>
