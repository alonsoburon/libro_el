<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>0307</title>
<style>body{margin:0;background:#181825;display:flex;flex-direction:column;align-items:center;padding:40px 20px}button{background:#333;color:#ccc;border:1px solid #555;padding:8px 20px;cursor:pointer;font-size:13px;border-radius:4px;margin-top:12px}button:hover{background:#444}</style>
</head><body>
<div id="chart"></div>
<button onclick="ECL.saveSVG(document.getElementById('chart'),'0307-open-closed')">Save SVG</button>
<script src="../ecl-charts.js"></script>
<script>
ECL.segment(document.getElementById("chart"), {
  title: "Open / closed document split",
  segments: [
    { label: "OPEN DOCUMENTS\n(mutable, re-extract all)", width: 1.5, color: "amber" },
    { label: "RECENTLY CLOSED\n(cursor catches transition)", width: 1, color: "olive" },
    { label: "CLOSED DOCUMENTS\n(immutable, cursor only)", width: 4, color: "muted_gray" },
  ],
  bracesTop: [
    [0, 0, "SELECT * WHERE status = 'open'"],
    [1, 2, "SELECT * WHERE status = 'closed' AND updated_at >= :cursor"],
  ],
  bracesBottom: [
    [0, 2, "UNION → single load"],
  ],
});
</script></body></html>
